name: MLOps CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Code Quality & Tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r src/requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Run unit tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short --cov=src --cov-report=xml || true
          else
            echo "No tests directory found - skipping tests"
          fi

  # Build Docker Image
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: mlops-repo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Model Training
  train:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Create models directory
        run: mkdir -p models

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r src/requirements.txt

      - name: Train ML Model
        run: |
          if [ -f "MLOps_CICD.py" ]; then
            python MLOps_CICD.py
          else
            echo "MLOps_CICD.py not found - skipping training"
          fi
        continue-on-error: true

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          if-no-files-found: ignore

  # Validate Model
  validate:
    needs: train
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/
        continue-on-error: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r src/requirements.txt

      - name: Run model validation
        run: |
          if [ -f "src/predict.py" ]; then
            python src/predict.py
          else
            echo "src/predict.py not found - skipping validation"
          fi
        continue-on-error: true

  # Workflow Completion Report
  summary:
    needs: [test, build, train, validate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print workflow summary
        run: |
          echo "═════════════════════════════════════"
          echo "  MLOps CI/CD Pipeline Complete"
          echo "═════════════════════════════════════"
          echo "Test:     ${{ needs.test.result }}"
          echo "Build:    ${{ needs.build.result }}"
          echo "Train:    ${{ needs.train.result }}"
          echo "Validate: ${{ needs.validate.result }}"
          echo "═════════════════════════════════════"
