name: MLOps CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Code Quality & Tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt 2>/dev/null || echo "requirements.txt not found"
          pip install pytest pytest-cov flake8 -q

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Run unit tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short || true
          else
            echo "No tests directory found"
          fi

  # Build Docker Image
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mlops-repo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Model Training
  train:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Create models directory
        run: mkdir -p models

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt 2>/dev/null || echo "requirements.txt not found"

      - name: Train ML Model
        run: |
          if [ -f "MLOps_CICD.py" ]; then
            python MLOps_CICD.py || echo "Training script completed with warnings"
          else
            echo "MLOps_CICD.py not found"
          fi

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/
          if-no-files-found: ignore
        if: always()

  # Validate
  validate:
    needs: train
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
        continue-on-error: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt 2>/dev/null || echo "requirements.txt not found"

      - name: Validate Model
        run: |
          if [ -f "src/predict.py" ]; then
            python src/predict.py || echo "Validation script completed with warnings"
          else
            echo "src/predict.py not found"
          fi
        continue-on-error: true

  # Workflow Summary
  summary:
    needs: [test, build, train, validate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Workflow Status
        run: |
          echo "✅ Workflow Summary:"
          echo "Test Status: ${{ needs.test.result }}"
          echo "Build Status: ${{ needs.build.result }}"
          echo "Train Status: ${{ needs.train.result }}"
          echo "Validate Status: ${{ needs.validate.result }}"
